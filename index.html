<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard бизнес-процессов · Строительная компания (EPC / Генподряд)</title>
<style>
:root{
  --bg:#0e1420; --bg2:#141c2b; --panel:#1a2436; --panel2:#212d42;
  --line:#2c3a52; --line2:#3a4a66;
  --txt:#e8edf6; --muted:#9aa9c2; --muted2:#6b7a94;
  --accent:#4f8cff; --accent2:#22d3ee;
  --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --info:#38bdf8;
  /* фазовые цвета */
  --p-sales:#3b82f6;      /* Инициация / продажи */
  --p-contract:#6366f1;   /* Контракт */
  --p-plan:#14b8a6;       /* Планирование / бюджет */
  --p-proc:#f59e0b;       /* Закупки */
  --p-build:#22c55e;      /* Производство */
  --p-close:#a855f7;      /* Закрытие / архив */
  --radius:14px;
  --shadow:0 8px 30px rgba(0,0,0,.35);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  background:radial-gradient(1200px 700px at 15% -10%,#182338 0%,var(--bg) 55%) fixed;
  color:var(--txt); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none}

/* ---------- Header ---------- */
header.top{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,rgba(14,20,32,.96),rgba(14,20,32,.82));
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.top-inner{max-width:1560px;margin:0 auto;padding:14px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px;min-width:260px}
.logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;color:#06111f;box-shadow:var(--shadow)}
.brand h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
.brand p{margin:1px 0 0;font-size:11.5px;color:var(--muted2)}
.kpi-strip{display:flex;gap:10px;flex:1;justify-content:flex-end;flex-wrap:wrap}
.kchip{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:7px 13px;min-width:96px}
.kchip .v{font-size:16px;font-weight:800}
.kchip .l{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px}
.kchip .v.g{color:var(--good)} .kchip .v.w{color:var(--warn)} .kchip .v.b{color:var(--info)}

/* ---------- Tabs ---------- */
nav.tabs{max-width:1560px;margin:0 auto;padding:0 26px;display:flex;gap:4px;overflow-x:auto;flex-wrap:wrap}
nav.tabs button{
  background:transparent;border:none;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;
  padding:12px 15px;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s
}
nav.tabs button:hover{color:var(--txt)}
nav.tabs button.active{color:var(--txt);border-bottom-color:var(--accent)}

/* ---------- Layout ---------- */
main{max-width:1560px;margin:0 auto;padding:26px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section-head{margin:0 0 4px}
.section-head h2{font-size:22px;margin:0 0 4px;font-weight:800;letter-spacing:-.3px}
.section-head p{margin:0 0 20px;color:var(--muted);max-width:920px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:0 0 22px}
.legend span{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
.dot{width:12px;height:12px;border-radius:4px;display:inline-block}

/* ---------- CEO flow ---------- */
.phase-band{margin-bottom:26px}
.phase-title{display:flex;align-items:center;gap:10px;margin:0 0 12px;font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.phase-title .bar{width:34px;height:4px;border-radius:3px}
.flow{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.node{
  position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 15px 13px;width:236px;cursor:pointer;transition:.16s;overflow:hidden;
  display:flex;flex-direction:column;
}
.node:hover{transform:translateY(-3px);border-color:var(--line2);box-shadow:var(--shadow)}
.node .stripe{position:absolute;left:0;top:0;bottom:0;width:5px}
.node .num{font-size:11px;font-weight:800;color:var(--muted2);letter-spacing:1px}
.node h3{font-size:14px;margin:5px 0 8px;font-weight:700;line-height:1.3;padding-left:4px}
.node .resp{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;padding-left:4px}
.node .resp b{color:var(--txt);font-weight:600}
.node .mini{margin-top:9px;display:flex;gap:6px;flex-wrap:wrap;padding-left:4px}
.tag{font-size:10px;padding:3px 7px;border-radius:6px;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
.tag.risk{color:#fca5a5;border-color:#5b2b2b;background:#2a1717}
.tag.kpi{color:#7dd3fc;border-color:#204257;background:#12262f}
.arrow{display:flex;align-items:center;justify-content:center;width:30px;color:var(--muted2);flex:0 0 30px;font-size:20px}
.arrow.down{width:100%;height:26px}

/* ---------- Detail panel (modal) ---------- */
.overlay{position:fixed;inset:0;background:rgba(6,10,18,.72);backdrop-filter:blur(4px);z-index:100;display:none;
  align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:18px;max-width:920px;width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden;animation:pop .22s ease}
@keyframes pop{from{opacity:0;transform:scale(.97) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{padding:22px 26px;position:relative;border-bottom:1px solid var(--line)}
.modal-head .num{font-size:12px;font-weight:800;letter-spacing:1.5px;opacity:.85}
.modal-head h3{margin:6px 0 3px;font-size:22px;font-weight:800}
.modal-head .sub{font-size:13px;opacity:.9}
.modal-close{position:absolute;top:18px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;
  width:34px;height:34px;border-radius:9px;font-size:18px;cursor:pointer;line-height:1}
.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-body{padding:22px 26px 28px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mb-full{grid-column:1 / -1}
.field{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.field h4{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2);font-weight:700}
.field ul{margin:0;padding-left:16px}.field li{margin:2px 0}
.field .doc{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:3px 8px;margin:2px 4px 2px 0;font-size:12px}
.raci-row{display:flex;flex-wrap:wrap;gap:8px}
.raci-badge{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px}
.raci-letter{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#06111f}
.rl-R{background:#22c55e}.rl-A{background:#f59e0b}.rl-C{background:#38bdf8}.rl-I{background:#a78bfa}
.riskbox{border-left:3px solid var(--bad);padding-left:12px;margin:6px 0}
.riskbox .rname{font-weight:600}
.riskbox .rmeta{font-size:11.5px;color:var(--muted)}
.autobox .doc{background:#12262f;border-color:#204257;color:#7dd3fc}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
table{border-collapse:collapse;width:100%;font-size:12.8px;min-width:760px}
th,td{padding:11px 13px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
th{background:var(--panel2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;position:sticky;top:0;z-index:2}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
td b{color:var(--txt)}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pill.hi{background:#3a1a1a;color:#fca5a5}.pill.md{background:#3a2e10;color:#fcd34d}.pill.lo{background:#12341f;color:#86efac}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--panel2);border:1px solid var(--line);margin:1px 2px}
.raci-cell{font-weight:800;text-align:center;width:34px}
.rc-R{color:#22c55e}.rc-A{color:#f59e0b}.rc-C{color:#38bdf8}.rc-I{color:#a78bfa}

/* ---------- Detailed process boards (procurement, docs, payment) ---------- */
.board{margin-bottom:34px}
.board > h3{font-size:16px;margin:0 0 14px;font-weight:800;display:flex;align-items:center;gap:10px}
.board > h3 .idx{width:26px;height:26px;border-radius:8px;background:var(--p-proc);color:#06111f;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.chain{display:flex;flex-wrap:wrap;gap:0;align-items:stretch}
.step{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;width:210px;position:relative}
.step .st-role{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.step h5{margin:5px 0 6px;font-size:13.5px;font-weight:700}
.step p{margin:0;font-size:11.5px;color:var(--muted)}
.step .limit{margin-top:8px;font-size:11px;background:#12262f;border:1px solid #204257;color:#7dd3fc;border-radius:6px;padding:4px 8px;display:inline-block}
.harrow{display:flex;align-items:center;justify-content:center;width:26px;color:var(--muted2);font-size:18px;flex:0 0 26px}
.varrow{width:100%;text-align:center;color:var(--muted2);font-size:16px;padding:3px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.modal-body{grid-template-columns:1fr}}
.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.check{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start}
.check .ic{color:var(--good);font-weight:800;font-size:15px;flex:0 0 auto}
.check .tx b{display:block;font-size:12.5px}
.check .tx span{font-size:11px;color:var(--muted)}
.callout{background:linear-gradient(135deg,rgba(79,140,255,.12),rgba(34,211,238,.08));border:1px solid var(--line2);
  border-radius:14px;padding:16px 20px;margin:0 0 24px;display:flex;gap:14px;align-items:flex-start}
.callout .ci{font-size:24px}
.callout b{color:var(--txt)}
.footer-note{color:var(--muted2);font-size:12px;text-align:center;padding:30px 0 10px;border-top:1px solid var(--line);margin-top:36px}
.subhead{font-size:14px;font-weight:700;margin:26px 0 12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <div class="logo">СК</div>
      <div>
        <h1>Dashboard бизнес-процессов</h1>
        <p>Строительная компания · EPC / Генподряд · от заказа до закрывающих документов</p>
      </div>
    </div>
    <div class="kpi-strip">
      <div class="kchip"><div class="v b">20</div><div class="l">этапов проекта</div></div>
      <div class="kchip"><div class="v w">15</div><div class="l">шагов закупки</div></div>
      <div class="kchip"><div class="v g">11</div><div class="l">ролей</div></div>
      <div class="kchip"><div class="v">40+</div><div class="l">документов</div></div>
      <div class="kchip"><div class="v">30+</div><div class="l">KPI</div></div>
    </div>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<main>
  <section class="view active" id="v-overview"></section>
  <section class="view" id="v-proc"></section>
  <section class="view" id="v-docs"></section>
  <section class="view" id="v-mat"></section>
  <section class="view" id="v-raci"></section>
  <section class="view" id="v-roles"></section>
  <section class="view" id="v-doclist"></section>
  <section class="view" id="v-kpi"></section>
  <section class="view" id="v-control"></section>
  <section class="view" id="v-risk"></section>
  <section class="view" id="v-auto"></section>
</main>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
/* =========================================================================
   ДАННЫЕ
   ========================================================================= */
const PHASES = {
  sales:   {name:'Инициация и продажи',      color:'var(--p-sales)'},
  contract:{name:'Контрактация',             color:'var(--p-contract)'},
  plan:    {name:'Планирование и бюджет',    color:'var(--p-plan)'},
  proc:    {name:'Закупки и снабжение',      color:'var(--p-proc)'},
  build:   {name:'Производство работ',       color:'var(--p-build)'},
  close:   {name:'Закрытие и архив',         color:'var(--p-close)'},
};

// 20 этапов главной схемы
const STAGES = [
  {n:1,phase:'sales',title:'Получение нового проекта',resp:'Коммерческий директор',
   in:['Тендерная документация','Запрос заказчика (RFP/RFQ)','Проектная документация (стадия П)'],
   out:['Карточка проекта','Регистрация в CRM'],
   decision:'Коммерческий директор',approve:['Собственник','Генеральный директор'],
   raci:[['Коммерческий директор','R'],['Генеральный директор','A'],['ПТО','C'],['Собственник','I']],
   kpi:['Кол-во входящих тендеров/мес','Конверсия лид→оценка','Скорость реакции (часы)'],
   risks:[['Нецелевой/непрофильный проект','Средняя','Потеря ресурсов на оценку','Скоринг-фильтр входящих']],
   docs:['Карточка проекта','Реестр тендеров','Чек-лист квалификации']},

  {n:2,phase:'sales',title:'Предварительная оценка',resp:'ПТО / Сметный отдел',
   in:['Проектная документация','Ведомости объёмов работ','Техзадание'],
   out:['Экспресс-смета','Оценка рисков','Предварительный график'],
   decision:'Директор по строительству',approve:['ПТО','Финансовый директор'],
   raci:[['Сметчик','R'],['Директор по строительству','A'],['Финансовый директор','C'],['Ген.директор','I']],
   kpi:['Точность экспресс-оценки (±%)','Срок подготовки оценки','Маржинальность (прогноз %)'],
   risks:[['Недооценка объёмов/стоимости','Высокая','Убыточный контракт','Нормоконтроль сметы, коэф. риска'],
          ['Неучтённые условия площадки','Средняя','Рост себестоимости','Выезд, изучение ИРД']],
   docs:['Экспресс-смета','Матрица рисков проекта','Заключение о целесообразности']},

  {n:3,phase:'sales',title:'Принятие решения об участии',resp:'Генеральный директор',
   in:['Экспресс-смета','Оценка рисков','Оценка загрузки мощностей'],
   out:['Решение Go / No-Go','Протокол тендерного комитета'],
   decision:'Генеральный директор / Собственник',approve:['Финансовый директор','Директор по строительству'],
   raci:[['Ген.директор','R'],['Собственник','A'],['Фин.директор','C'],['Коммерческий директор','I']],
   kpi:['% Go-решений','Win-rate по Go-проектам','ROI прошедших решений'],
   risks:[['Ошибочное Go по рисковому проекту','Средняя','Кассовый разрыв, репутация','Тендерный комитет, лимиты риска']],
   docs:['Протокол тендерного комитета','Решение Go/No-Go']},

  {n:4,phase:'sales',title:'Подготовка коммерческого предложения',resp:'Сметный отдел + Коммерция',
   in:['Проектная документация','Прайсы поставщиков','Нормативы, ГЭСН/ФЕР'],
   out:['Тендерная смета','Коммерческое предложение','График производства работ'],
   decision:'Финансовый директор (цена/маржа)',approve:['Ген.директор','ПТО'],
   raci:[['Сметчик','R'],['Фин.директор','A'],['Снабжение','C'],['Ген.директор','I']],
   kpi:['Срок подготовки КП','Заложенная маржа %','Полнота учёта объёмов %'],
   risks:[['Демпинг ради победы','Высокая','Работа в убыток','Минимальная маржа-лимит'],
          ['Ошибки в расценках','Средняя','Потеря прибыли','Двойной нормоконтроль']],
   docs:['Тендерная смета','Коммерческое предложение','Календарный график']},

  {n:5,phase:'contract',title:'Победа в тендере',resp:'Коммерческий директор',
   in:['Протокол тендера','Уведомление заказчика'],
   out:['Протокол о победе','Проект договора'],
   decision:'Заказчик',approve:['Юрист','Финансовый директор'],
   raci:[['Коммерческий директор','R'],['Ген.директор','A'],['Юрист','C'],['ПТО','I']],
   kpi:['Win-rate %','Средний чек контракта','Отклонение цены победы от плановой'],
   risks:[['Победа с заниженной ценой','Средняя','Убыток по проекту','Пересчёт перед подписанием']],
   docs:['Протокол о победе','Уведомление о заключении договора']},

  {n:6,phase:'contract',title:'Заключение договора',resp:'Юридический отдел',
   in:['Проект договора','Тендерная смета','Устав/реквизиты сторон'],
   out:['Подписанный договор','График финансирования','Банковская гарантия'],
   decision:'Генеральный директор',approve:['Юрист','Финансовый директор','Служба безопасности'],
   raci:[['Юрист','R'],['Ген.директор','A'],['Фин.директор','C'],['ПТО','I']],
   kpi:['Срок согласования договора','% защитных условий','Наличие обеспечения'],
   risks:[['Несбалансированные условия/штрафы','Высокая','Финансовые потери','Юр. экспертиза, чек-лист рисков'],
          ['Отсутствие обеспечения оплаты','Средняя','Кассовый разрыв','Аванс/БГ/аккредитив']],
   docs:['Договор подряда','График финансирования','Банковская/страховая гарантия']},

  {n:7,phase:'plan',title:'Передача проекта в производство',resp:'Руководитель проекта',
   in:['Подписанный договор','Тендерная смета','Проектная документация'],
   out:['Приказ о старте','Назначение команды проекта','Kick-off протокол'],
   decision:'Директор по строительству',approve:['Руководитель проекта','ПТО'],
   raci:[['Руководитель проекта','R'],['Директор по строительству','A'],['ПТО','C'],['Снабжение','I']],
   kpi:['Срок передачи в работу','Полнота передачи документации %','Укомплектованность команды %'],
   risks:[['Потеря информации при передаче','Средняя','Ошибки в производстве','Kick-off, единый реестр документов']],
   docs:['Приказ о начале работ','Матрица команды проекта','Протокол передачи']},

  {n:8,phase:'plan',title:'Планирование строительства',resp:'ПТО / Руководитель проекта',
   in:['Проектная документация','Договорной график','Ведомости объёмов'],
   out:['Календарно-сетевой график (КСГ)','ППР','График потребности ресурсов'],

function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function renderOverview(){
  const el=$('#v-overview');
  let h=`<div class="section-head"><h2>Полный жизненный цикл проекта</h2>
    <p>От появления заказа до получения закрывающих документов. 20 этапов, сгруппированных в 6 фаз.

  const order=['sales','contract','plan','proc','build','close'];
  order.forEach(ph=>{
    const list=STAGES.filter(s=>s.phase===ph);
    if(!list.length)return;
    const c=PHASES[ph].color;
    h+=`<div class="phase-band"><div class="phase-title" style="color:${c}"><span class="bar" style="background:${c}"></span>${PHASES[ph].name}</div><div class="flow">`;

function nodeHTML(s,c){
  const risk=s.risks[0]?s.risks[0][0]:'';
  return `<div class="node" onclick="openStage(${s.n})">
    <div class="stripe" style="background:${c}"></div>
    <div class="num">ЭТАП ${String(s.n).padStart(2,'0')}</div>
    <h3>${esc(s.title)}</h3>
    <div class="resp">👤 <b>${esc(s.resp)}</b></div>
    <div class="mini"><span class="tag kpi">KPI: ${esc(s.kpi[0])}</span><span class="tag risk">⚠ ${esc(risk)}</span></div>
  </div>`;
}

function openStage(n){
  const s=STAGES.find(x=>x.n===n); if(!s)return;
  const c=cssColor(PHASES[s.phase].color);
  const raci=s.raci.map(([who,l])=>`<div class="raci-badge"><span class="raci-letter rl-${l}">${l}</span>${esc(who)}</div>`).join('');
  const risks=s.risks.map(r=>`<div class="riskbox"><div class="rname">${esc(r[0])}</div>
    <div class="rmeta">Вероятность: <b>${esc(r[1])}</b> · Последствия: ${esc(r[2])}<br>Контроль: ${esc(r[3])}</div></div>`).join('');
  $('#modal').innerHTML=`
    <div class="modal-head" style="background:linear-gradient(135deg,${c}33,transparent)">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="num" style="color:${c}">ЭТАП ${String(s.n).padStart(2,'0')} · ${esc(PHASES[s.phase].name)}</div>
      <h3>${esc(s.title)}</h3>
      <div class="sub">👤 Ответственный (R): <b>${esc(s.resp)}</b></div>
    </div>
    <div class="modal-body">
      <div class="field"><h4>Входящие документы</h4>${s.in.map(d=>`<span class="doc">${esc(d)}</span>`).join('')}</div>
      <div class="field"><h4>Исходящие документы</h4>${s.out.map(d=>`<span class="doc">${esc(d)}</span>`).join('')}</div>
      <div class="field"><h4>Кто принимает решение</h4><b>${esc(s.decision)}</b></div>
      <div class="field"><h4>Кто согласовывает</h4>${s.approve.map(d=>`<span class="doc">${esc(d)}</span>`).join('')}</div>
      <div class="field mb-full"><h4>Матрица RACI</h4><div class="raci-row">${raci}</div></div>
      <div class="field"><h4>KPI процесса</h4><ul>${s.kpi.map(k=>`<li>${esc(k)}</li>`).join('')}</ul></div>
      <div class="field"><h4>Риски и контроль</h4>${risks}</div>

    </div>`;
  $('#overlay').classList.add('show');
}

/* ---- Generic table renderer ---- */
function tableView(id,title,sub,headers,rows,rowFn){
  let h=`<div class="section-head"><h2>${title}</h2><p>${sub}</p></div>`;
  h+=`<div class="table-wrap"><table><thead><tr>`+headers.map(x=>`<th>${x}</th>`).join('')+`</tr></thead><tbody>`;
  rows.forEach(r=>h+=`<tr>${rowFn(r)}</tr>`);
  h+=`</tbody></table></div>`;
  $('#'+id).innerHTML=h;
}

    <div class="grid2">
      <div class="field"><h4>Контроль количества (М2)</h4><div class="check-grid" style="grid-template-columns:1fr">`+
      MAT_QTY_CHECKS.map(c=>`<div class="check"><div class="ic">#</div><div class="tx"><b>${esc(c[0])}</b><span>${esc(c[1])}</span></div></div>`).join('')+
      `</div></div>
      <div class="field"><h4>Контроль качества (М3)</h4><div class="check-grid" style="grid-template-columns:1fr">`+
      MAT_QC_CHECKS.map(c=>`<div class="check"><div class="ic">✓</div><div class="tx"><b>${esc(c[0])}</b><span>${esc(c[1])}</span></div></div>`).join('')+
      `</div></div>
    </div></div>`;

  // Учётные формы
  h+=`<div class="board"><h3><span class="idx" style="background:var(--p-close)">📋</span>Учётные формы складского движения</h3>
    <div class="table-wrap"><table><thead><tr><th>Форма / документ</th><th>Назначение</th><th>Ответственный</th></tr></thead><tbody>`+
    MAT_FORMS.map(f=>`<tr><td><b>${esc(f[0])}</b></td><td>${esc(f[1])}</td><td>${esc(f[2])}</td></tr>`).join('')+
    `</tbody></table></div></div>`;

  el.innerHTML=h;
}
